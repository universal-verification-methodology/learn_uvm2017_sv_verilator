- type: section
  title: Design architecture
  narration: 'Next section: Design architecture.'
- type: two_column
  title: 1. UVM agent internal architecture (1/3)
  left:
  - 'Active agent: sequencer + driver + monitor (generates and observes stimulus)'
  - 'Passive agent: monitor only (observation/checking on monitored bus)'
  - Agent `is_active` config selects build-time component set
  - 'Sequencer-driver TLM: `driver.seq_item_port.connect(sequencer.seq_item_export)`'
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE4 Design Architecture.
  narration: '1. UVM agent internal architecture (1/3). Active agent: sequencer +
    driver + monitor (generates and observes stimulus) Passive agent: monitor only
    (observation/checking on monitored bus) Agent is_active config selects build-time
    component set Sequencer-driver TLM: driver.seq_item_port.connect(sequencer.seq_item_export)
    Refer to the diagram on the right.'
- type: bullets
  title: 1. UVM agent internal architecture (2/3)
  bullets:
  - 'uvm_sequencer: Arbitrates sequences; exports seq_item_export'
  - 'uvm_driver: seq_item_port pulls items; drives virtual interface'
  - 'uvm_monitor: Passive observation; broadcasts via analysis port'
  - 'uvm_agent: Configures active/passive; builds child components'
  notes: From MODULE4 Design Architecture.
  narration: '1. UVM agent internal architecture (2/3). uvm_sequencer: Arbitrates
    sequences; exports seq_item_export uvm_driver: seq_item_port pulls items; drives
    virtual interface uvm_monitor: Passive observation; broadcasts via analysis port
    uvm_agent: Configures active/passive; builds child components'
- type: bullets
  title: 1. UVM agent internal architecture (3/3)
  bullets:
  - 'uvm_sequence: Produces randomized/constrained transactions'
  notes: From MODULE4 Design Architecture.
  narration: '1. UVM agent internal architecture (3/3). uvm_sequence: Produces randomized/constrained
    transactions'
- type: two_column
  title: 2. Transaction-level data path (1/3)
  left:
  - 'TLM ports: `uvm_analysis_port` / `uvm_analysis_export` for monitor → scoreboard'
  - Transactions implement `do_copy`, `do_compare`, `convert2string` for debug and
    checking
  - 'Execution sequence: build agent → connect TLM → start sequence in `run_phase`'
  - '1: Sequence — randomize() transaction fields'
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE4 Design Architecture.
  narration: '2. Transaction-level data path (1/3). TLM ports: uvm_analysis_port /
    uvm_analysis_export for monitor → scoreboard Transactions implement do_copy, do_compare,
