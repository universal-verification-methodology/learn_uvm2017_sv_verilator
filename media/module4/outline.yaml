    -I$UVM_HOME/src +incdir+$UVM_HOME/src +define+UVM_NO_DPI \

    --binary $UVM_HOME/src/uvm_pkg.sv transactions.sv transactions.cpp \

    --top-module transactions

    make -C obj_dir -f Vtransactions.mk

    ./obj_dir/Vtransactions'
