- type: section
  title: Verification & testing methods
  narration: 'Next section: Verification & testing methods.'
- type: two_column
  title: 1. Component-level verification strategy
  left:
  - Verify each component in isolation before agent integration
  - 'Driver: loopback or simple slave model confirms pin wiggles match items'
  - 'Monitor: drive known patterns; confirm reconstructed transactions'
  - 'Sequencer: run single sequence; count items completed vs requested'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE4 Verification & Testing Methods.
  narration: '1. Component-level verification strategy. Verify each component in isolation
    before agent integration Driver: loopback or simple slave model confirms pin wiggles
    match items Monitor: drive known patterns; confirm reconstructed transactions
    Sequencer: run single sequence; count items completed vs requested Refer to the
    diagram on the right.'
- type: two_column
  title: 2. Agent integration and closure (1/2)
  left:
  - Connect monitor analysis port to scoreboard export in `connect_phase`
  - Use `uvm_config_db` to pass virtual interface to driver and monitor
  - 'Regression: `./scripts/module4.sh --all-examples` then `--uvm-tests`'
  - 'Pass criteria: scoreboard match count equals transaction count; no UVM_ERROR'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE4 Verification & Testing Methods.
  narration: '2. Agent integration and closure (1/2). Connect monitor analysis port
    to scoreboard export in connect_phase Use uvm_config_db to pass virtual interface
    to driver and monitor Regression: ./scripts/module4.sh --all-examples then --uvm-tests
    Pass criteria: scoreboard match count equals transaction count; no UVM_ERROR Refer
    to the diagram on the right.'
- type: bullets
  title: 2. Agent integration and closure (2/2)
  bullets:
  - Waveform optional — rely on transaction logs and scoreboard summary first
  notes: From MODULE4 Verification & Testing Methods.
  narration: 2. Agent integration and closure (2/2). Waveform optional — rely on transaction
