- type: section
  title: Common pitfalls
  narration: 'Next section: Common pitfalls.'
- type: bullets
  title: CLP Plusarg Not Found
  bullets:
  - 'Problem: Configuration uses default values'
  - 'Solution: Check return value, provide defaults'
  - 'Code: `if (uvm_cmdline_proc.get_arg_value("+arg", str_val)) value = sv_atoi(str_val);`'
  notes: From MODULE8 Common Pitfalls.
  narration: 'CLP Plusarg Not Found. Problem: Configuration uses default values Solution:
    Check return value, provide defaults Code: if (uvm_cmdline_proc.get_arg_value("+arg",
    str_val)) value = sv_atoi(str_val);'
- type: bullets
  title: Comparator Queues Never Match
  bullets:
  - 'Problem: Transactions never arrive in both queues'
  - 'Solution: Check analysis port connections'
  - 'Code: Verify `expected_port.connect()` and `actual_port.connect()`'
  notes: From MODULE8 Common Pitfalls.
  narration: 'Comparator Queues Never Match. Problem: Transactions never arrive in
    both queues Solution: Check analysis port connections Code: Verify expected_port.connect()
    and actual_port.connect()'
- type: bullets
  title: Pool Exhaustion
  bullets:
  - 'Problem: Pool runs out of objects'
  - 'Solution: Increase pool size or check free() calls'
  - 'Code: `pool_size = 20;` or ensure all objects are freed'
  notes: From MODULE8 Common Pitfalls.
  narration: 'Pool Exhaustion. Problem: Pool runs out of objects Solution: Increase
    pool size or check free() calls Code: pool_size = 20; or ensure all objects are
    freed'
- type: bullets
  title: Priority Queue Wrong Order
  bullets:
  - 'Problem: Transactions not in priority order'
  - 'Solution: Check compare() method implementation'
  - 'Code: `if (prio > rhs.prio) return 1;` (higher priority = higher value)'
  notes: From MODULE8 Common Pitfalls.
  narration: 'Priority Queue Wrong Order. Problem: Transactions not in priority order
    Solution: Check compare() method implementation Code: if (prio > rhs.prio) return
    1; (higher priority = higher value)'
- type: bullets
  title: String Extraction Fails
  bullets:
  - 'Problem: Field not extracted correctly'
  - 'Solution: Check string format and field name'
  - 'Code: Verify format matches expected pattern'
  notes: From MODULE8 Common Pitfalls.
  narration: 'String Extraction Fails. Problem: Field not extracted correctly Solution:
    Check string format and field name Code: Verify format matches expected pattern'
- type: bullets
  title: Math Division Truncation
  bullets:
  - 'Problem: Average calculation truncates'
  - 'Solution: Use `real''()` cast for floating-point division'
  - 'Code: `return sum / real''(values.size());`'
  notes: From MODULE8 Common Pitfalls.
  narration: 'Math Division Truncation. Problem: Average calculation truncates Solution:
    Use real''() cast for floating-point division Code: return sum / real''(values.size());'
