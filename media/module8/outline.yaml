- type: section
  title: Verification & testing methods
  narration: 'Next section: Verification & testing methods.'
- type: two_column
  title: 1. Utility-driven test configuration
  left:
  - Use `+UVM_TESTNAME=` and `+UVM_VERBOSITY=` instead of hard-coded test selection
  - Pass custom plusargs (`+NUM_TRANS=`, `+TIMEOUT=`) via CLP getters
  - 'Seed control: plusarg → `uvm_random_utils` or `$urandom` for reproducible bugs'
  - Recorders capture failing transaction windows for post-sim review
  right: assets/diagrams/testing_methods.png
  notes: From MODULE8 Verification & Testing Methods.
  narration: '1. Utility-driven test configuration. Use +UVM_TESTNAME= and +UVM_VERBOSITY=
    instead of hard-coded test selection Pass custom plusargs (+NUM_TRANS=, +TIMEOUT=)
    via CLP getters Seed control: plusarg → uvm_random_utils or $urandom for reproducible
    bugs Recorders capture failing transaction windows for post-sim review Refer to
    the diagram on the right.'
- type: two_column
  title: 2. Debug and regression strategy (1/2)
  left:
  - Enable comparer policy (ignore certain fields) for noisy buses
  - Pools share counters/statistics between monitor and scoreboard without globals
  - 'Regression: `./scripts/module8.sh --all-examples --uvm-tests`'
  - '`./scripts/module8.sh --integration` validates combined utility usage'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE8 Verification & Testing Methods.
  narration: '2. Debug and regression strategy (1/2). Enable comparer policy (ignore
    certain fields) for noisy buses Pools share counters/statistics between monitor
    and scoreboard without globals Regression: ./scripts/module8.sh --all-examples
    --uvm-tests ./scripts/module8.sh --integration validates combined utility usage
    Refer to the diagram on the right.'
- type: bullets
  title: 2. Debug and regression strategy (2/2)
  bullets:
  - 'Closure: utility self-tests PASS + integration test UVM report clean'
  notes: From MODULE8 Verification & Testing Methods.
  narration: '2. Debug and regression strategy (2/2). Closure: utility self-tests
    PASS + integration test UVM report clean'
