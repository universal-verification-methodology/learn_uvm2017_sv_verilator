- type: two_column
  title: 1. UVM utility layer architecture (1/3)
  left:
  - Utilities sit below agents/env — used by transactions, scoreboards, tests
  - CLP is singleton — query in `build_phase` or test `new()` for test configuration
  - Comparators plug into `do_compare` for field-tolerant matching
  - Integration example (`examples/integration/`) wires multiple utilities in one
    TB
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE8 Design Architecture.
  narration: 1. UVM utility layer architecture (1/3). Utilities sit below agents/env
    — used by transactions, scoreboards, tests CLP is singleton — query in build_phase
    or test new() for test configuration Comparators plug into do_compare for field-tolerant
    matching Integration example (examples/integration/) wires multiple utilities
    in one TB Refer to the diagram on the right.
