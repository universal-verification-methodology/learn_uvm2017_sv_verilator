- type: two_column
  title: 1. Course repository layout (1/3)
  left:
  - Project-local install (`--local`) keeps tools inside the repo for reproducibility
  - WSL2/Linux is the primary target; macOS supported via Homebrew
  - 'Environment variables: `VERILATOR_ROOT`, `UVM_HOME` must resolve before running
    labs'
  - 'tools/verilator/: Git submodule — SystemVerilog/Verilog simulator (build from
    source)'
  right: assets/diagrams/rtl_architecture.png
