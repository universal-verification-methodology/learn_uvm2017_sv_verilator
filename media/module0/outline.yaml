- type: section
  title: Hands-on examples
- type: demo
  title: Module 0 self-check
  command: verilator --version
  screenshot: assets/screenshots/module0_check.png
  expect_stdout_contains: Verilator
  notes: Run from course repository root.
- type: demo
  title: 'Demo: Verify toolchain'
  command: verilator --version && source scripts/setup_uvm_env.sh 2>/dev/null || true
    && test -f "${UVM_HOME:-tools/uvm-2017/1800.2-2017-1.0/src}/uvm_pkg.sv" && echo
    "UVM library OK" && make --version | head -1
  screenshot: assets/screenshots/ex01_install.png
  notes: 'Hands-on: module0/examples/install/'
- type: demo
  title: 'Demo: Project layout'
  command: ls -la docs/MODULE0.md module1/README.md scripts/installation.sh
  screenshot: assets/screenshots/ex02_project.png
  notes: 'Hands-on: module0/examples/project/'
  expect_stdout_contains: total
- type: demo
  title: 'Demo: Optional full install'
  command: ./scripts/installation.sh --help | head -20
  screenshot: assets/screenshots/ex03_install-full.png
  notes: 'Hands-on: module0/examples/install-full/'
- type: demo
  title: 'Demo: First smoke test'
  command: ./scripts/module1.sh --help | head -15
  screenshot: assets/screenshots/ex04_hello.png
  notes: 'Hands-on: module0/examples/hello/'
