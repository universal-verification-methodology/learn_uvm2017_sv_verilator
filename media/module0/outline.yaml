- type: bullets
  title: 7. Project Structure Setup (2/4)
  bullets:
  - Git Submodules Management
  - Verilator is managed as a git submodule in `tools/verilator/`
  - UVM is downloaded as a tarball to `tools/uvm-2017/` (not a git submodule)
  - 'Initialize submodules: `./scripts/init_submodules.sh` or `git submodule update
    --init --recursive`'
  - 'Update submodules: `./scripts/update_submodules.sh` or `git submodule update
    --remote`'
  - 'Add new submodule: `./scripts/add_submodule.sh <repo_url> <path>`'
  notes: From MODULE0 Topics Covered.
