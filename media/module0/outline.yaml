- type: two_column
  title: 2. Build and simulation artifact flow (1/2)
  left:
  - Verilator compiles design + testbench into a single fast C++ binary
  - UVM examples add `-I$UVM_HOME/src` and `+define+UVM_NO_DPI` for Verilator compatibility
  - 'Self-check flow: install → `verilator --version` → `./scripts/module0.sh --check`
    → run Module 1 lab'
  - '1: Source .v/.sv — RTL and testbench SystemVerilog'
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE0 Design Architecture.
  narration: '2. Build and simulation artifact flow (1/2). Verilator compiles design
    + testbench into a single fast C++ binary UVM examples add -I$UVM_HOME/src and
    +define+UVM_NO_DPI for Verilator compatibility Self-check flow: install → verilator
    --version → ./scripts/module0.sh --check → run Module 1 lab 1: Source .v/.sv —
    RTL and testbench SystemVerilog Refer to the diagram on the right.'
- type: bullets
  title: 2. Build and simulation artifact flow (2/2)
  bullets:
  - '2: verilator --cc — Emits C++ model under obj_dir/'
  - '3: make -C obj_dir — Links Vtop (or V<module>) executable'
  - '4: ./obj_dir/V* — Runs simulation; prints PASS/FAIL or UVM report'
  - '5: *.vcd (optional) — Waveform when --trace enabled'
