  narration: 'Next section: Verification & testing methods.'
- type: two_column
  title: 1. Environment verification strategy (1/2)
  left:
  - Run `./scripts/installation.sh` (or per-tool scripts) before any module labs
  - 'Verify compiler toolchain: `gcc --version`, `make --version`, `git --version`'
  - 'Confirm Verilator: `verilator --version` and a minimal `--lint-only` compile'
  - 'Confirm UVM: `echo $UVM_HOME` points at `tools/uvm-2017/1800.2-2017-1.0/src`'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE0 Verification & Testing Methods.
  narration: '1. Environment verification strategy (1/2). Run ./scripts/installation.sh
    (or per-tool scripts) before any module labs Verify compiler toolchain: gcc --version,
    make --version, git --version Confirm Verilator: verilator --version and a minimal
    --lint-only compile Confirm UVM: echo $UVM_HOME points at tools/uvm-2017/1800.2-2017-1.0/src
    Refer to the diagram on the right.'
- type: bullets
  title: 1. Environment verification strategy (2/2)
  bullets:
  - Use `./scripts/module0.sh --check` for an automated PASS summary
  notes: From MODULE0 Verification & Testing Methods.
  narration: 1. Environment verification strategy (2/2). Use ./scripts/module0.sh
    --check for an automated PASS summary
- type: two_column
  title: 2. Smoke test and troubleshooting workflow (1/2)
  left:
  - 'Smoke test: compile one trivial Verilog file with Verilator; expect clean exit'
  - 'UVM smoke: run `module3/examples/class_hierarchy` after Module 0 completes'
  - 'Common failures: missing `UVM_HOME`, wrong Verilator version, WSL path issues'
  - 'Logs: capture terminal output; search for `Error`, `%Error`, `UVM_FATAL`'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE0 Verification & Testing Methods.
  narration: '2. Smoke test and troubleshooting workflow (1/2). Smoke test: compile
    one trivial Verilog file with Verilator; expect clean exit UVM smoke: run module3/examples/class_hierarchy
    after Module 0 completes Common failures: missing UVM_HOME, wrong Verilator version,
    WSL path issues Logs: capture terminal output; search for Error, %Error, UVM_FATAL
    Refer to the diagram on the right.'
- type: bullets
  title: 2. Smoke test and troubleshooting workflow (2/2)
  bullets:
  - 'Escalation: re-run installer with `--from-submodule` for a clean Verilator build'
  notes: From MODULE0 Verification & Testing Methods.
  narration: '2. Smoke test and troubleshooting workflow (2/2). Escalation: re-run
