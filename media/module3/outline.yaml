- type: section
  title: Verification & testing methods
  narration: 'Next section: Verification & testing methods.'
- type: two_column
  title: 1. UVM infrastructure patterns
  left:
  - Factory — create components with `type_id::create()`; enable overrides later
  - ConfigDB — pass virtual interfaces and config objects down the hierarchy
  - Reporting — `uvm_info`/`uvm_error` with verbosity and ID filtering
  - Objections — `raise_objection`/`drop_objection` in `run_phase` hold simulation
    alive
  right: assets/diagrams/testing_methods.png
  notes: From MODULE3 Verification & Testing Methods.
  narration: 1. UVM infrastructure patterns. Factory — create components with type_id::create();
    enable overrides later ConfigDB — pass virtual interfaces and config objects down
    the hierarchy Reporting — uvm_info/uvm_error with verbosity and ID filtering Objections
    — raise_objection/drop_objection in run_phase hold simulation alive Refer to the
    diagram on the right.
- type: two_column
  title: 2. Verilator + UVM execution strategy (1/2)
  left:
  - Compile with `-I$UVM_HOME/src +define+UVM_NO_DPI` (no DPI for Verilator)
  - C++ `main` calls `uvm_main` or wrapper that invokes `run_test("MyTest")`
  - Start with standalone examples (no DUT) to learn hierarchy and phases
  - Progress to `test_adder_uvm` — connect virtual interface to RTL adder
  right: assets/diagrams/testing_methods.png
  notes: From MODULE3 Verification & Testing Methods.
  narration: 2. Verilator + UVM execution strategy (1/2). Compile with -I$UVM_HOME/src
    +define+UVM_NO_DPI (no DPI for Verilator) C++ main calls uvm_main or wrapper that
    invokes run_test("MyTest") Start with standalone examples (no DUT) to learn hierarchy
    and phases Progress to test_adder_uvm — connect virtual interface to RTL adder
    Refer to the diagram on the right.
