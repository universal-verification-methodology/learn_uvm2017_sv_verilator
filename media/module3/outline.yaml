- type: two_column
  title: 1. UVM class hierarchy (1/3)
  left:
  - 'Object hierarchy: `uvm_object` → `uvm_sequence_item` → your transaction'
  - 'Component hierarchy: `uvm_component` → driver/monitor/agent/env/test'
  - Factory macros (`uvm_component_utils`) register types for `type_id::create()`
  - 'Component tree: Test → Env → Agent → {Driver, Monitor, Sequencer}'
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE3 Design Architecture.
  narration: '1. UVM class hierarchy (1/3). Object hierarchy: uvm_object → uvm_sequence_item
    → your transaction Component hierarchy: uvm_component → driver/monitor/agent/env/test
    Factory macros (uvm_component_utils) register types for type_id::create() Component
    tree: Test → Env → Agent → {Driver, Monitor, Sequencer} Refer to the diagram on
    the right.'
- type: bullets
  title: 1. UVM class hierarchy (2/3)
  bullets:
  - 'uvm_test: Top-level; calls run_test(), owns environment'
  - 'uvm_env: Contains agents, scoreboard, coverage (as needed)'
  - 'uvm_agent: Groups driver, monitor, sequencer on one interface'
  - 'uvm_driver: Converts sequence items to pin wiggles'
  notes: From MODULE3 Design Architecture.
  narration: '1. UVM class hierarchy (2/3). uvm_test: Top-level; calls run_test(),
    owns environment uvm_env: Contains agents, scoreboard, coverage (as needed) uvm_agent:
    Groups driver, monitor, sequencer on one interface uvm_driver: Converts sequence
    items to pin wiggles'
- type: bullets
  title: 1. UVM class hierarchy (3/3)
  bullets:
  - 'uvm_monitor: Observes bus/DUT; emits transactions'
  - 'uvm_sequence_item: Transaction payload (data, address, etc.)'
  notes: From MODULE3 Design Architecture.
  narration: '1. UVM class hierarchy (3/3). uvm_monitor: Observes bus/DUT; emits transactions
    uvm_sequence_item: Transaction payload (data, address, etc.)'
- type: two_column
  title: 2. UVM phase graph and execution order (1/2)
  left:
  - 'Build-time (top-down): `build_phase` → `connect_phase` → `end_of_elaboration_phase`'
  - 'Run-time (bottom-up): `run_phase` with objections controlling sim time'
  - 'Report: `report_phase` summarizes UVM_INFO/WARNING/ERROR counts'
  - '`super.build_phase(phase)` required in every override to preserve hierarchy'
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE3 Design Architecture.
  narration: '2. UVM phase graph and execution order (1/2). Build-time (top-down):
    build_phase → connect_phase → end_of_elaboration_phase Run-time (bottom-up): run_phase
    with objections controlling sim time Report: report_phase summarizes UVM_INFO/WARNING/ERROR
    counts super.build_phase(phase) required in every override to preserve hierarchy
    Refer to the diagram on the right.'
- type: bullets
  title: 2. UVM phase graph and execution order (2/2)
  bullets:
  - 'Simulation flow: elaboration → `run_test()` → phases → `$finish`'
  notes: From MODULE3 Design Architecture.
  narration: 'This section covers installation, setup, and how to run the examples.
    Simulation flow: elaboration → run_test() → phases → $finish'
