- type: two_column
  title: 1. System-level stimulus strategy
  left:
  - Virtual sequences coordinate reset, config, traffic, and shutdown across agents
  - Constrained-random transactions with covergroups measuring interesting bins
  - 'Register tests: reset values, bit-field access, alias rules, prediction vs actual'
  - Callbacks for error injection and debug without modifying driver source
  right: assets/diagrams/testing_methods.png
  notes: From MODULE5 Verification & Testing Methods.
  narration: '1. System-level stimulus strategy. Virtual sequences coordinate reset,
    config, traffic, and shutdown across agents Constrained-random transactions with
    covergroups measuring interesting bins Register tests: reset values, bit-field
    access, alias rules, prediction vs actual Callbacks for error injection and debug
    without modifying driver source Refer to the diagram on the right.'
- type: two_column
  title: 2. Coverage-driven closure (1/2)
  left:
  - Define coverpoints on transaction fields and cross coverage between channels
  - Use `uvm_config_db` to enable/disable coverage and set verbosity per test
  - 'Closure metrics: functional coverage goals + zero scoreboard mismatches'
  - '`./scripts/module5.sh --coverage` demonstrates sampling and report'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE5 Verification & Testing Methods.
  narration: '2. Coverage-driven closure (1/2). Define coverpoints on transaction
    fields and cross coverage between channels Use uvm_config_db to enable/disable
