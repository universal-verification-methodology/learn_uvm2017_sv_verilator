- type: two_column
  title: 1. Application-specific verification strategy
  left:
  - 'DMA: descriptor alignment, boundary lengths, error flags, concurrent channels'
  - 'Serial protocols: baud/bit timing, framing, parity, back-to-back packets'
  - 'VIP usage: configure via object; run standard sequences before custom stress'
  - Directed tests prove basic paths; random tests explore corner combinations
  right: assets/diagrams/testing_methods.png
  notes: From MODULE7 Verification & Testing Methods.
  narration: '1. Application-specific verification strategy. DMA: descriptor alignment,
    boundary lengths, error flags, concurrent channels Serial protocols: baud/bit
    timing, framing, parity, back-to-back packets VIP usage: configure via object;
    run standard sequences before custom stress Directed tests prove basic paths;
    random tests explore corner combinations Refer to the diagram on the right.'
- type: two_column
  title: 2. Production best practices (1/2)
  left:
  - Centralize plusargs via CLP (Module 8) for seed, verbosity, test name
  - Separate test intent (test class) from reusable env (VIP + env)
  - Log protocol transactions at UVM_MEDIUM; errors at UVM_LOW
  - 'Regression: `./scripts/module7.sh --all-examples --uvm-tests`'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE7 Verification & Testing Methods.
  narration: '2. Production best practices (1/2). Centralize plusargs via CLP (Module
    8) for seed, verbosity, test name Separate test intent (test class) from reusable
    env (VIP + env) Log protocol transactions at UVM_MEDIUM; errors at UVM_LOW Regression:
    ./scripts/module7.sh --all-examples --uvm-tests Refer to the diagram on the right.'
