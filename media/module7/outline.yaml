- type: bullets
  title: 'Detail: DMA Transaction Randomization (1)'
  bullets:
  - 'Method Signature: `function bit randomize();`'
  - 'Return Type: `bit` (1 = success, 0 = failure)'
  - 'Purpose: Generate random DMA transfer parameters'
  - 'Usage: `void''(t.randomize() with { len inside {[1:20]}; });`'
  notes: From MODULE7 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: DMA Transaction Randomization (1). Method
    Signature: function bit randomize(); Return Type: bit (1 = success, 0 = failure)
    Purpose: Generate random DMA transfer parameters Usage: void''(t.randomize() with
    { len inside {[1:20]}; }); From MODULE7 Topics Covered — protocol/design depth.'
- type: bullets
  title: 'Detail: DMA Transaction Randomization (2)'
  bullets:
  - 'Parameters: None (randomizes all `rand` fields in object)'
  - 'Constraints: Use `with { constraint_expression; }` to limit values'
  - 'Example: `len inside {[1:20]}` constrains transfer length to 1-20 bytes'
  - 'Key: `void''()` suppresses Verilator warning about ignored return value'
  notes: From MODULE7 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: DMA Transaction Randomization (2). Parameters:
    None (randomizes all rand fields in object) Constraints: Use with { constraint_expression;
    } to limit values Example: len inside {[1:20]} constrains transfer length to 1-20
    bytes Key: void''() suppresses Verilator warning about ignored return value From
    MODULE7 Topics Covered — protocol/design depth.'
- type: bullets
  title: 'Detail: DMA Protocol Implementation'
  bullets:
  - 'Pattern: Start pulse → Wait for done → Completion'
  - 'Key: `do-while` loop waits for `dma_done` pulse'
  notes: From MODULE7 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: DMA Protocol Implementation. Pattern: Start
    pulse → Wait for done → Completion Key: do-while loop waits for dma_done pulse
    From MODULE7 Topics Covered — protocol/design depth.'
- type: bullets
  title: 'Detail: UART Protocol Implementation (1)'
  bullets:
  - 'Pattern: Data → Start → Wait for busy deassert → Completion'
  - 'Key: Wait for `tx_busy` to deassert'
  - 'Event Control: `@(posedge clk)` - wait for positive clock edge'
  - 'Non-blocking Assignment: `<=` - schedule assignment for next time step'
  notes: From MODULE7 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: UART Protocol Implementation (1). Pattern:
    Data → Start → Wait for busy deassert → Completion Key: Wait for tx_busy to deassert
    Event Control: @(posedge clk) - wait for positive clock edge Non-blocking Assignment:
    <= - schedule assignment for next time step From MODULE7 Topics Covered — protocol/design
    depth.'
- type: bullets
  title: 'Detail: UART Protocol Implementation (2)'
  bullets:
  - 'Do-While Loop: `do @(posedge clk); while (condition);` - wait for condition'
  - 'Purpose: Enable loopback testing'
  - 'Use Case: Minimal smoke testing without external device'
  notes: From MODULE7 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: UART Protocol Implementation (2). Do-While
