- type: bullets
  title: Virtual Interface Not Set
  bullets:
  - 'Problem: `uvm_fatal("NO_VIF", ...)` error'
  - 'Solution: Set interface in module before `run_test()`'
  - 'Code: `uvm_config_db#(virtual if)::set(null, "*", "vif", vif);`'
  notes: From MODULE6 Common Pitfalls.
