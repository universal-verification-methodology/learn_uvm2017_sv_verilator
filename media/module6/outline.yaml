- type: bullets
  title: Agent Configuration Not Retrieved
  bullets:
  - 'Problem: Agent uses default values'
  - 'Solution: Check return value, provide defaults'
  - 'Code: `if (!uvm_config_db#(int)::get(...)) agent_id = 0;`'
  notes: From MODULE6 Common Pitfalls.
  narration: 'Agent Configuration Not Retrieved. Problem: Agent uses default values
    Solution: Check return value, provide defaults Code: if (!uvm_config_db#(int)::get(...))
    agent_id = 0;'
- type: bullets
  title: Virtual Sequence References Not Set
  bullets:
  - 'Problem: Null pointer exception'
  - 'Solution: Set sequencer references before starting'
  - 'Code: `vseq.seqr0 = env.a0.seqr; vseq.start(null);`'
  notes: From MODULE6 Common Pitfalls.
  narration: 'Virtual Sequence References Not Set. Problem: Null pointer exception
    Solution: Set sequencer references before starting Code: vseq.seqr0 = env.a0.seqr;
