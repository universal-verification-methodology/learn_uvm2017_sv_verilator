- type: bullets
  title: Protocol Handshake Deadlock
  bullets:
  - 'Problem: Simulation hangs waiting for READY'
  - 'Solution: Use bounded wait in protocol checker'
  - 'Code: `while (condition && cycles < max_cycles)`'
  notes: From MODULE6 Common Pitfalls.
  narration: 'Protocol Handshake Deadlock. Problem: Simulation hangs waiting for READY
    Solution: Use bounded wait in protocol checker Code: while (condition && cycles
    < max_cycles)'
- type: bullets
  title: Scoreboard Memory Leak
  bullets:
  - 'Problem: Unmatched transactions accumulate'
  - 'Solution: Delete matched transactions'
  - 'Code: `q0.delete(t.seq); q1.delete(t.seq);`'
  - 'Check: Virtual interface retrieved in `build_phase()`'
  notes: From MODULE6 Common Pitfalls.
  narration: 'Scoreboard Memory Leak. Problem: Unmatched transactions accumulate Solution:
    Delete matched transactions Code: q0.delete(t.seq); q1.delete(t.seq); Check: Virtual
    interface retrieved in build_phase()'
