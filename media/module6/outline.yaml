- type: section
  title: Verification & testing methods
  narration: 'Next section: Verification & testing methods.'
- type: two_column
  title: 1. Multi-agent coordination strategy
  left:
  - Assign each agent a virtual interface and address/data range via ConfigDB
  - Run parallel sequences with objections on env or test (not per short sequence)
  - Protocol checker runs passively — does not drive, only flags violations
  - Use predictable directed traffic before enabling constrained-random stress
  right: assets/diagrams/testing_methods.png
  notes: From MODULE6 Verification & Testing Methods.
  narration: 1. Multi-agent coordination strategy. Assign each agent a virtual interface
    and address/data range via ConfigDB Run parallel sequences with objections on
    env or test (not per short sequence) Protocol checker runs passively — does not
    drive, only flags violations Use predictable directed traffic before enabling
    constrained-random stress Refer to the diagram on the right.
- type: two_column
  title: 2. System-level closure workflow (1/2)
  left:
  - Scoreboard empty at end — no pending expected transactions
  - Protocol checker reports zero violations
  - 'Regression: `./scripts/module6.sh --all-examples --uvm-tests`'
  - 'Debug order: signal wave → monitor log → scoreboard mismatch → checker message'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE6 Verification & Testing Methods.
  narration: '2. System-level closure workflow (1/2). Scoreboard empty at end — no
    pending expected transactions Protocol checker reports zero violations Regression:
    ./scripts/module6.sh --all-examples --uvm-tests Debug order: signal wave → monitor
    log → scoreboard mismatch → checker message Refer to the diagram on the right.'
