- type: bullets
  title: 'Detail: Function and Task Best Practices (1)'
  bullets:
  - Functions execute in zero time
  - Perfect for data transformations, comparisons
  - Must return a value (or `void`)
  - Tasks can contain delays
  notes: From MODULE1 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: Function and Task Best Practices (1). Functions
    execute in zero time Perfect for data transformations, comparisons Must return
    a value (or void) Tasks can contain delays From MODULE1 Topics Covered — protocol/design
    depth.'
- type: bullets
  title: 'Detail: Function and Task Best Practices (2)'
  bullets:
  - Perfect for test sequences, stimulus generation
  - No return value
  - Always check for null before accessing object fields
  - Prevents simulation crashes
  notes: From MODULE1 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: Function and Task Best Practices (2). Perfect
    for test sequences, stimulus generation No return value Always check for null
    before accessing object fields Prevents simulation crashes From MODULE1 Topics
    Covered — protocol/design depth.'
