- type: section
  title: Verification & testing methods
  narration: 'Next section: Verification & testing methods.'
- type: two_column
  title: 1. Directed self-check methodology
  left:
  - Instantiate DUT, apply known stimulus in `initial` block or C++ main
  - Compare outputs in-test; print `PASS` / `FAIL` (no external scoreboard yet)
  - Use `$display` / `$error` for visibility; graduate to structured logging in Module
    2
  - 'Simulation flow: `make SIM=verilator TEST=test_and_gate` → compile → run → read
    result'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE1 Verification & Testing Methods.
  narration: '1. Directed self-check methodology. Instantiate DUT, apply known stimulus
    in initial block or C++ main Compare outputs in-test; print PASS / FAIL (no external
    scoreboard yet) Use $display / $error for visibility; graduate to structured logging
    in Module 2 Simulation flow: make SIM=verilator TEST=test_and_gate → compile →
    run → read result Refer to the diagram on the right.'
- type: two_column
  title: 2. Baseline test closure (1/2)
  left:
  - 'Stimulus: fixed vectors covering corner cases (0, 1, overflow, reset)'
  - 'Checking: inline assertions and explicit comparisons against expected values'
  - 'Coverage: manual review of cases exercised (functional coverage in Module 5)'
  - 'Regression: `./scripts/module1.sh --all-sv` runs all example compilations'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE1 Verification & Testing Methods.
  narration: '2. Baseline test closure (1/2). Stimulus: fixed vectors covering corner
    cases (0, 1, overflow, reset) Checking: inline assertions and explicit comparisons
    against expected values Coverage: manual review of cases exercised (functional
    coverage in Module 5) Regression: ./scripts/module1.sh --all-sv runs all example
    compilations Refer to the diagram on the right.'
