- type: bullets
  title: 'Detail: Functions vs Tasks (1)'
  bullets:
  - 'Purpose: Compute and return a single value'
  - 'Return Type: Must declare a return type (`void`, `int`, `string`, `bit`, etc.)'
  - 'Timing: Execute in zero simulation time (no delays allowed)'
  - 'Usage: For calculations, data transformations, comparisons'
  notes: From MODULE1 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: Functions vs Tasks (1). Purpose: Compute
    and return a single value Return Type: Must declare a return type (void, int,
    string, bit, etc.) Timing: Execute in zero simulation time (no delays allowed)
    Usage: For calculations, data transformations, comparisons From MODULE1 Topics
    Covered — protocol/design depth.'
- type: bullets
  title: 'Detail: Functions vs Tasks (2)'
  bullets:
  - 'Syntax: `function <return_type> <name>(<arguments>); ... endfunction`'
  - 'When to Use:'
  - ✅ Data validation (`is_valid_address()`)
  - ✅ Calculations (`calculate_checksum()`)
  notes: From MODULE1 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: Functions vs Tasks (2). Syntax: function
