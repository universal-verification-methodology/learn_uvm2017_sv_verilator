  - Use virtual tasks for polymorphism
  - Create reusable components
  - 'Issue: `forever` with `~` operator can cause timing issues'
  - 'Solution: Use explicit assignment with delays'
  notes: From MODULE2 Topics Covered.
  narration: '7. Functions and Tasks for Testbench Construction (10/23). Handle edge
    cases Encapsulate common sequences Use virtual tasks for polymorphism Create reusable
