- type: section
  title: Verification & testing methods
  narration: 'Next section: Verification & testing methods.'
- type: two_column
  title: 1. Stimulus and timing strategy
  left:
  - 'Clock generation: parameterized period/duty; multiple clocks for CDC awareness'
  - 'Reset sequences: assert length, sync deassert, mid-test reset injection'
  - 'Triggers: `@posedge`, `wait()`, `fork-join` for parallel activity'
  - 'Signal access: hierarchical references and interface modport access'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE2 Verification & Testing Methods.
  narration: '1. Stimulus and timing strategy. Clock generation: parameterized period/duty;
    multiple clocks for CDC awareness Reset sequences: assert length, sync deassert,
    mid-test reset injection Triggers: @posedge, wait(), fork-join for parallel activity
    Signal access: hierarchical references and interface modport access Refer to the
    diagram on the right.'
- type: two_column
  title: 2. Checking and debug workflow (1/2)
  left:
  - Self-checking tests compare DUT outputs against expected values each cycle
  - Waveforms (`--trace`) for debugging timing and reset issues
  - 'Closure criteria: all directed cases PASS; no `$error` or timeout'
  - '`./scripts/module2.sh --all-examples` for module-level regression'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE2 Verification & Testing Methods.
  narration: '2. Checking and debug workflow (1/2). Self-checking tests compare DUT
    outputs against expected values each cycle Waveforms (--trace) for debugging timing
    and reset issues Closure criteria: all directed cases PASS; no $error or timeout
    ./scripts/module2.sh --all-examples for module-level regression Refer to the diagram
    on the right.'
