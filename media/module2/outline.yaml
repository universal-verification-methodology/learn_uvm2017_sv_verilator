- type: bullets
  title: 7. Functions and Tasks for Testbench Construction (11/23)
  bullets:
  - 'Issue: Fixed delays don''t guarantee clock alignment'
  - 'Solution: Always use `@(posedge clk)` for synchronization'
  - 'Issue: Insufficient reset duration or propagation time'
  - 'Solution: Use configurable duration and add propagation delay'
  - 'Issue: Non-blocking assignments in tasks can cause timing issues'
  - 'Solution: Use blocking assignments (`=`) in tasks'
  notes: From MODULE2 Topics Covered.
  narration: '7. Functions and Tasks for Testbench Construction (11/23). Issue: Fixed
    delays don''t guarantee clock alignment Solution: Always use @(posedge clk) for
    synchronization Issue: Insufficient reset duration or propagation time Solution:
    Use configurable duration and add propagation delay Issue: Non-blocking assignments
    in tasks can cause timing issues'
- type: bullets
  title: 7. Functions and Tasks for Testbench Construction (12/23)
  bullets:
  - 'Issue: No way to verify tasks completed successfully'
  - 'Solution: Add completion messages or flags'
  - 'Issue: Wait statement can hang if condition never becomes true'
  - 'Solution: Use fork-join with timeout'
  - 'Simple clocks: Use `always` blocks (efficient)'
  - 'Multiple clocks: Each clock needs separate `always` block'
  notes: From MODULE2 Topics Covered.
  narration: '7. Functions and Tasks for Testbench Construction (12/23). Issue: No
    way to verify tasks completed successfully Solution: Add completion messages or
    flags Issue: Wait statement can hang if condition never becomes true Solution:
    Use fork-join with timeout Simple clocks: Use always blocks (efficient)'
- type: bullets
  title: 7. Functions and Tasks for Testbench Construction (13/23)
  bullets:
  - 'Gated clocks: Conditional logic adds minimal overhead'
  - 'Tasks: Slower due to timing simulation overhead'
  - 'Functions: Faster (zero-time), but can''t use delays'
  - 'Recommendation: Use functions for calculations, tasks for sequences'
  - '`@(posedge clk)`: Efficient, event-driven'
  - '`#delay`: Time-based, requires scheduling'
  notes: From MODULE2 Topics Covered.
  narration: '7. Functions and Tasks for Testbench Construction (13/23). Gated clocks:
    Conditional logic adds minimal overhead Tasks: Slower due to timing simulation
    overhead Functions: Faster (zero-time), but can''t use delays Recommendation:
    Use functions for calculations, tasks for sequences @(posedge clk): Efficient,
    event-driven'
- type: bullets
  title: 7. Functions and Tasks for Testbench Construction (14/23)
  bullets:
  - '`wait(condition)`: Polls condition, can be slower'
  - '`fork-join`: Creates parallel processes (overhead)'
  - 'Use sparingly: Only when parallel execution is needed'
  - 'Alternative: Sequential execution is faster'
  - 'Symptoms: Clock signal stuck at 0 or 1'
  - 'Causes:'
  notes: From MODULE2 Topics Covered.
  narration: '7. Functions and Tasks for Testbench Construction (14/23). wait(condition):
    Polls condition, can be slower fork-join: Creates parallel processes (overhead)
    Use sparingly: Only when parallel execution is needed Alternative: Sequential
    execution is faster Symptoms: Clock signal stuck at 0 or 1'
- type: bullets
  title: 7. Functions and Tasks for Testbench Construction (15/23)
  bullets:
  - '`always` block not executing'
  - Delay value too large or zero
  - Blocking on condition that never becomes true
  - 'Solutions:'
  - Check `always` block syntax
  - Verify delay values are positive
  notes: From MODULE2 Topics Covered.
  narration: '7. Functions and Tasks for Testbench Construction (15/23). always block
    not executing Delay value too large or zero Blocking on condition that never becomes
    true Solutions: Check always block syntax'
- type: bullets
  title: 7. Functions and Tasks for Testbench Construction (16/23)
