- type: two_column
  title: 2. RTL block architecture (example DUTs)
  left:
  - Register files — address decode, read/write timing, reset behavior
  - FIFOs — full/empty flags, pointer management, back-pressure
  - State machines — explicit states, transition conditions, output logic
  - 'Signal flow: clk/rst → sequential logic → status flags → TB monitors'
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE2 Design Architecture.
  narration: '2. RTL block architecture (example DUTs). Register files — address decode,
    read/write timing, reset behavior FIFOs — full/empty flags, pointer management,
    back-pressure State machines — explicit states, transition conditions, output
    logic Signal flow: clk/rst → sequential logic → status flags → TB monitors Refer
    to the diagram on the right.'
- type: two_column
  title: 3. Verilator execution pipeline
  left:
  - '1: Makefile — Invokes Verilator with --cc --exe --timing'
  - '2: obj_dir/V*.cpp — Generated cycle-accurate C++ model'
  - '3: sim_main.cpp — Clock generation and $finish coordination'
  - '4: ./obj_dir/V* — Executable; TB prints PASS/FAIL'
  right: assets/diagrams/testing_methods.png
  notes: From MODULE2 Design Architecture.
  narration: '3. Verilator execution pipeline. 1: Makefile — Invokes Verilator with
    --cc --exe --timing 2: obj_dir/V*.cpp — Generated cycle-accurate C++ model 3:
    sim_main.cpp — Clock generation and $finish coordination 4: ./obj_dir/V* — Executable;
    TB prints PASS/FAIL Refer to the diagram on the right.'
