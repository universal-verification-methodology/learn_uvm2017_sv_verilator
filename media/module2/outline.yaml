    cross via module ports or SystemVerilog interfaces Hierarchy: TB module → DUT
    instance → optional interface instance Time: #delay, @posedge, and C++ time loop
    must stay consistent See SYSTEMVERILOG_VERILATOR_INTERACTION.md for compile/sim
    details Refer to the diagram on the right.'
