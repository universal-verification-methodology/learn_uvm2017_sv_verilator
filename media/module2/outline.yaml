- type: bullets
  title: 'Detail: Common Pitfalls in Testbench Construction (1)'
  bullets:
  - 'Issue: `forever` with `~` operator can cause timing issues'
  - 'Solution: Use explicit assignment with delays'
  - 'Issue: Fixed delays don''t guarantee clock alignment'
  - 'Solution: Always use `@(posedge clk)` for synchronization'
  notes: From MODULE2 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: Common Pitfalls in Testbench Construction
    (1). Issue: forever with ~ operator can cause timing issues Solution: Use explicit
    assignment with delays Issue: Fixed delays don''t guarantee clock alignment Solution:
    Always use @(posedge clk) for synchronization From MODULE2 Topics Covered — protocol/design
    depth.'
- type: bullets
  title: 'Detail: Common Pitfalls in Testbench Construction (2)'
  bullets:
  - 'Issue: Insufficient reset duration or propagation time'
  - 'Solution: Use configurable duration and add propagation delay'
  - 'Issue: Non-blocking assignments in tasks can cause timing issues'
  - 'Solution: Use blocking assignments (`=`) in tasks'
  notes: From MODULE2 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: Common Pitfalls in Testbench Construction
    (2). Issue: Insufficient reset duration or propagation time Solution: Use configurable
    duration and add propagation delay Issue: Non-blocking assignments in tasks can
    cause timing issues Solution: Use blocking assignments (=) in tasks From MODULE2
    Topics Covered — protocol/design depth.'
- type: bullets
  title: 'Detail: Performance Considerations (1)'
  bullets:
  - 'Simple clocks: Use `always` blocks (efficient)'
  - 'Multiple clocks: Each clock needs separate `always` block'
  - 'Gated clocks: Conditional logic adds minimal overhead'
  - 'Tasks: Slower due to timing simulation overhead'
  notes: From MODULE2 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: Performance Considerations (1). Simple clocks:
    Use always blocks (efficient) Multiple clocks: Each clock needs separate always
    block Gated clocks: Conditional logic adds minimal overhead Tasks: Slower due
    to timing simulation overhead From MODULE2 Topics Covered — protocol/design depth.'
- type: bullets
  title: 'Detail: Performance Considerations (2)'
  bullets:
  - 'Functions: Faster (zero-time), but can''t use delays'
  - 'Recommendation: Use functions for calculations, tasks for sequences'
  - '`@(posedge clk)`: Efficient, event-driven'
  - '`#delay`: Time-based, requires scheduling'
  notes: From MODULE2 Topics Covered — protocol/design depth.
  narration: 'Protocol and design detail: Performance Considerations (2). Functions:
    Faster (zero-time), but can''t use delays Recommendation: Use functions for calculations,
