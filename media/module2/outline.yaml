- type: two_column
  title: 1. SystemVerilog testbench architecture (1/3)
  left:
  - 'DUT boundary: signals cross via module ports or SystemVerilog interfaces'
  - 'Hierarchy: TB module → DUT instance → optional interface instance'
  - 'Time: `#delay`, `@posedge`, and C++ time loop must stay consistent'
  - See [SYSTEMVERILOG_VERILATOR_INTERACTION.md](SYSTEMVERILOG_VERILATOR_INTERACTION.md)
    for compile/sim details
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE2 Design Architecture.
