  - 'Symptoms: Registers not resetting to expected values'
  - 'Causes:'
  - Insufficient reset duration
  - Reset de-asserted too early
  - Missing propagation delay
  notes: From MODULE2 Topics Covered.
  narration: '7. Functions and Tasks for Testbench Construction (16/23). Use $display
    to debug clock generation Symptoms: Registers not resetting to expected values
    Causes: Insufficient reset duration Reset de-asserted too early'
- type: bullets
  title: 7. Functions and Tasks for Testbench Construction (17/23)
  bullets:
  - 'Solutions:'
  - Increase reset duration
  - Add delay after reset de-assert
  - Verify reset polarity (active-high vs active-low)
  - 'Symptoms: Signal value doesn''t change as expected'
  - 'Causes:'
  notes: From MODULE2 Topics Covered.
  narration: '7. Functions and Tasks for Testbench Construction (17/23). Solutions:
    Increase reset duration Add delay after reset de-assert Verify reset polarity
    (active-high vs active-low) Symptoms: Signal value doesn''t change as expected'
- type: bullets
  title: 7. Functions and Tasks for Testbench Construction (18/23)
  bullets:
  - Not synchronized to clock
  - Using wrong assignment type
  - Signal not being driven
  - 'Solutions:'
  - Use `@(posedge clk)` before reading
  - Use blocking assignment (`=`) in tasks
  notes: From MODULE2 Topics Covered.
  narration: '7. Functions and Tasks for Testbench Construction (18/23). Not synchronized
    to clock Using wrong assignment type Signal not being driven Solutions: Use @(posedge
    clk) before reading'
- type: bullets
  title: 7. Functions and Tasks for Testbench Construction (19/23)
  bullets:
  - Verify signal is being driven
  - 'Symptoms: Inconsistent behavior, timing-dependent failures'
  - 'Causes:'
  - Multiple processes accessing same signal
  - Clock and data changing simultaneously
  - Missing synchronization
  notes: From MODULE2 Topics Covered.
  narration: '7. Functions and Tasks for Testbench Construction (19/23). Verify signal
    is being driven Symptoms: Inconsistent behavior, timing-dependent failures Causes:
    Multiple processes accessing same signal Clock and data changing simultaneously'
- type: bullets
  title: 7. Functions and Tasks for Testbench Construction (20/23)
  bullets:
  - 'Solutions:'
  - Use proper clock synchronization
  - Avoid shared variable access
  - Use non-blocking assignment in sequential logic
  - 'Symptoms: Code continues before tasks complete'
  - 'Causes:'
  notes: From MODULE2 Topics Covered.
  narration: '7. Functions and Tasks for Testbench Construction (20/23). Solutions:
    Use proper clock synchronization Avoid shared variable access Use non-blocking
    assignment in sequential logic Symptoms: Code continues before tasks complete'
- type: bullets
  title: 7. Functions and Tasks for Testbench Construction (21/23)
  bullets:
  - Using `join_none` instead of `join`
  - Tasks completing before join
  - 'Solutions:'
  - Use `join` to wait for all tasks
  - Use `join_any` to wait for first task
  - Add completion flags if needed
